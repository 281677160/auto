<%+cbi/valueheader%>
<div class="cbi-value-field">
    <input class="cbi-button cbi-button-apply" type="button" value="<%:Start Upgrade%>" 
        onclick="confirmUpgrade()" />
    <div id="upgrade-status" style="display: inline-block; margin-left: 10px;"></div>
</div>
<script type="text/javascript">
var button = document.querySelector('.cbi-button-apply');
var statusDiv = document.getElementById('upgrade-status');

function setButtonState(disabled, text) {
    button.disabled = disabled;
    button.value = text;
    statusDiv.textContent = '';
}

function showStatus(message, isError) {
    statusDiv.style.color = isError ? '#c44' : '#4c4';
    statusDiv.textContent = message;
}

function confirmUpgrade() {
    setButtonState(true, '<%:Checking...%>');
    
    // 第一阶段：检查更新
    fetch('<%=url("admin/system/autoupdate/do_check")%>', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
    })
    .then(response => response.json())
    .then(data => {
        if (!data.success) {
            showStatus(data.message, true);
            setButtonState(false, '<%:Start Upgrade%>');
            return;
        }
        
        if (data.has_update) {
            if (confirm(data.message)) {
                // 第二阶段：确认升级
                setButtonState(true, '<%:Upgrading...%>');
                performUpgrade();
            } else {
                setButtonState(false, '<%:Start Upgrade%>');
            }
        } else {
            showStatus(data.message, false);
            setButtonState(false, '<%:Start Upgrade%>');
        }
    });
}

function performUpgrade() {
    fetch('<%=url("admin/system/autoupdate/do_upgrade")%>', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showStatus('<%:Upgrade started! Rebooting...%>', false);
        } else {
            showStatus(data.message, true);
            setButtonState(false, '<%:Start Upgrade%>');
        }
    });
}
</script>
<%+cbi/valuefooter%>
