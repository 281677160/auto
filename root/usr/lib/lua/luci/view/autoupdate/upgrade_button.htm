<%+cbi/valueheader%>
<div class="cbi-value-field">
    <input class="cbi-button cbi-button-apply" type="button" value="<%:检查更新%>" 
        onclick="startUpgradeProcess()" id="upgrade-btn" />
    <div id="status-message" style="margin-left:10px;display:inline-block"></div>
</div>
<script type="text/javascript">
// 全局状态锁（防止重复提交）:ml-citation{ref="3,6" data="citationList"}
let isProcessing = false;

function updateButtonState(disabled, text) {
    const btn = document.getElementById('upgrade-btn');
    btn.disabled = disabled;
    btn.value = text;
}

function showStatus(text, isError) {
    const statusDiv = document.getElementById('status-message');
    statusDiv.style.color = isError ? '#d44' : '#4a4';
    statusDiv.textContent = text;
}

function startUpgradeProcess() {
    if (isProcessing) return;
    isProcessing = true;
    updateButtonState(true, '<%:检查中...%>');

    // 第一阶段：检查更新
    fetch('<%=url("admin/system/autoupdate/do_check")%>', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
    })
    .then(response => {
        if (!response.ok) throw new Error(`HTTP错误: ${response.status}`);
        return response.json();
    })
    .then(data => {
        if (!data.success) {
            showStatus(data.message, true);
            return;
        }
        
        if (data.has_update && confirm(data.message)) {
            // 第二阶段：执行升级
            updateButtonState(true, '<%:升级中...%>');
            performUpgrade();
        } else {
            showStatus(data.message, !data.has_update);
        }
    })
    .catch(error => {
        showStatus(`网络请求失败: ${error}`, true);
    })
    .finally(() => {
        isProcessing = false;
        updateButtonState(false, '<%:检查更新%>');
    });
}


function performUpgrade() {
    fetch('<%=url("admin/system/autoupdate/do_upgrade")%>', {
        method: 'POST'
    })
    .then(response => {
        if (response.status === 502) {  // 网关超时直接忽略:ml-citation{ref="5" data="citationList"}
            showStatus("后台升级持续进行中...", false);
            return;
        }
        return response.json();
    })
    .then(data => {
        if (data && data.success) {
            showStatus(data.message, false);
        }
    })
    .catch(() => { 
        // 网络错误不中断进程:ml-citation{ref="2" data="citationList"}
        showStatus("命令已提交，最终结果请查看日志", false);
    });
}
</script>
<%+cbi/valuefooter%>
