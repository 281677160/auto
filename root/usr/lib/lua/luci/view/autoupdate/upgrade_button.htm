<%+cbi/valueheader%>
<div class="cbi-value-field">
    <input id="upgrade-btn" class="cbi-button cbi-button-apply" type="button" 
           value="<%:Start Upgrade%>" onclick="startUpgradeFlow()" />
    <div id="status-msg" style="margin-top:8px; display:none;"></div>
    <pre id="log-container" style="display:none; max-height:200px; overflow:auto; border:1px solid #ddd; padding:8px;"></pre>
</div>

<script type="text/javascript">
async function startUpgradeFlow() {
    const btn = document.getElementById('upgrade-btn');
    const statusDiv = document.getElementById('status-msg');
    const logPre = document.getElementById('log-container');
    
    btn.disabled = true;
    statusDiv.style.display = 'block';
    
    try {
        // 阶段1：发起升级请求
        statusDiv.innerHTML = '<%:Checking system status...%> 🕒';
        let response = await fetch('<%=url("admin/system/autoupdate/do_upgrade")%>', {
            method: 'POST'
        });
        
        // 阶段2：处理响应
        const result = await response.json();
        
        if (result.status_msg) {
            statusDiv.innerHTML = result.status_msg;
        }
        
        if (result.success) {
            statusDiv.innerHTML = '<span style="color:green">✔️ <%:Upgrade started!%></span>';
            logPre.style.display = 'block';
            logPre.textContent = result.log || '<%:No logs available%>';
            
            // 自动跳转倒计时
            let count = 10;
            const timer = setInterval(() => {
                statusDiv.innerHTML = `<span style="color:green">✔️ <%:Upgrade started! Rebooting in ${count--}s...%></span>`;
                if (count < 0) {
                    clearInterval(timer);
                    window.location.reload();
                }
            }, 1000);
        } else {
            statusDiv.innerHTML = `<span style="color:red">❌ <%:Operation failed:%> ${result.message}</span>`;
            logPre.style.display = 'block';
            logPre.textContent = result.log || '<%:No failure logs%>';

            // 自动跳转倒计时
            let count = 60;
            const timer = setInterval(() => {
                statusDiv.innerHTML = `<span style="color:red">❌ <%:Operation failed! Rebooting in ${count--}s...%></span>`;
                if (count < 0) {
                    clearInterval(timer);
                    window.location.reload();
                }
            }, 1000);
        }
    } catch (error) {
        statusDiv.innerHTML = `<span style="color:red"><%:Network error:%> ${error}</span>`;
    } finally {
        btn.disabled = false;
    }
}
</script>
<%+cbi/valuefooter%>
